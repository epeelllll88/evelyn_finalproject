<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drawable Canvas Converter</title>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <style>
      :root {
        --bg: #f4f1ea;
        --panel: #fff9ee;
        --ink: #1f1f1f;
        --accent: #c75c36;
        --line: #d4c8b2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(circle at 20% 0%, #fffdf7 0%, var(--bg) 60%);
        color: var(--ink);
      }

      .app {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px;
      }

      h1 {
        margin: 4px 0 12px;
        font-size: 1.5rem;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        padding: 10px;
        border: 2px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
      }

      .toolbar label {
        font-size: 0.95rem;
      }

      .toolbar button,
      .toolbar input {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
        background: #ece2ce;
      }

      button.primary {
        background: var(--accent);
        color: #fff;
      }

      #statusMsg {
        margin: 10px 0;
        min-height: 1.25rem;
        font-weight: 700;
      }

      #drawArea {
        border: 2px dashed var(--line);
        border-radius: 12px;
        background: #fff;
        min-height: 65vh;
        overflow: hidden;
      }

      #drawArea canvas {
        display: block;
      }

      .result {
        margin-top: 14px;
        border: 2px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        background: #fff;
      }

      .result img {
        width: 100%;
        max-height: 320px;
        object-fit: contain;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <h1>Draw Anything, Then Convert to Image</h1>

      <div class="toolbar">
        <label>
          Brush Color
          <input id="brushColor" type="color" value="#202020" />
        </label>

        <label>
          Brush Size
          <input id="brushSize" type="range" min="1" max="40" value="6" />
        </label>

        <button id="clearBtn" type="button">Clear Canvas</button>
        <button id="convertBtn" type="button" class="primary">Convert to Image</button>
      </div>

      <p id="statusMsg">Ready to draw.</p>

      <div id="drawArea"></div>

      <div class="result">
        <h2>Converted Image</h2>
        <img id="convertedImg" alt="Converted drawing output" />
      </div>
    </div>

    <script src="sketch.js"></script>
  </body>
</html>
